<!DOCTYPE html>
<html>
<head>
    <title>Our Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Our Pizza Menu 🍕</h2>

    <div class="row">
        {% for pizza in pizzas %}
        <div class="col-md-4 mb-4">
            <div class="card shadow mb-4">
    <img src="{{ pizza.image.url }}" class="card-img-top" height="200">

    <div class="card-body text-center">
        <h4>{{ pizza.name }}</h4>
        <p>{{ pizza.description }}</p>

        <p>Small: ₹{{ pizza.small_price }}</p>
        <p>Medium: ₹{{ pizza.medium_price }}</p>
        <p>Large: ₹{{ pizza.large_price }}</p>

        <a href="{% url 'order_pizza' pizza.id %}" class="btn btn-danger"></a>
            Order Now
                    </a>
                </div>

            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
